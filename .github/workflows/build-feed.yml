name: Build GST Circulars Feed

on:
  # Run twice a day, at 03:30 and 13:30 UTC (09:00 and 19:00 IST)
  schedule:
    - cron: "30 3,13 * * *"
  # Lets you click "Run workflow" manually from the Actions tab
  workflow_dispatch:

# Allow this workflow to commit the updated feed back to the repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the scraper
        run: python scrape.py

      - name: Commit the updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          # Only commit if the feed actually changed
          if git diff --staged --quiet; then
            echo "No changes to the feed."
          else
            git commit -m "Update GST circulars feed"
            git push
          fi
